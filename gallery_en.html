<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Together We Can Foundation</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
      body {
          font-family: 'Montserrat', sans-serif;
          scroll-behavior: smooth;
      }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-down { animation: fadeInDown 0.8s ease-out forwards; }

      /* Mobile Menu Animation */
      .mobile-menu-enter { opacity: 0; transform: translateY(-10px); }
      .mobile-menu-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }

      /* Gallery Specific Styles */
      .gallery-image-container {
        position: relative;
        overflow: hidden;
        border-radius: 1rem;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gallery-image-container:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      }
      .gallery-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
      }
      .gallery-image-container:hover .gallery-image {
        transform: scale(1.1);
      }
      .image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
        display: flex;
        align-items: flex-end;
        padding: 1.5rem;
      }
      .gallery-image-container:hover .image-overlay {
        opacity: 1;
      }
      .image-description {
        color: white;
        font-weight: 600;
        transform: translateY(20px);
        opacity: 0;
        transition: transform 0.4s 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s 0.1s ease;
      }
      .gallery-image-container:hover .image-description {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased selection:bg-pink-100 selection:text-pink-700">

    <div id="root"></div>

    <!-- React, ReactDOM, and Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- ICONS ---
        const Icons = {
            HandHelping: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 1.9c.7 0 1.4.3 1.8.8l4 5.2c.5.5.8 1.2.8 1.9V10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V8.8c0-.7.3-1.4.8-1.9L11 1.9z" /><path d="M12 11v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg> ),
            Info: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg> ),
            Phone: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></svg> ),
            BookOpen: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg> ),
            Brain: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5c-3.18 0-6 2.82-6 6a6 6 0 0 0 12 0c0-3.18-2.82-6-6-6z" /><path d="M12 18c-3.18 0-6-2.82-6-6" /><path d="M12 18c3.18 0 6-2.82 6-6" /><path d="M12 11a6 6 0 0 1-6 6" /><path d="M12 11a6 6 0 0 0 6 6" /></svg> ),
            Menu: ({ size = 24, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="18" x2="20" y2="18" /></svg> ),
            X: ({ size = 24, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg> ),
            ImageIcon: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> ),
        };

        // --- Data for all gallery sections (English) ---
        const galleryData = [
            { title: "Lecture Series", description: "A lecture series was organized on various topics. We had excellent speakers and received a great response from the audience.", images: [ { id: 'vyakhyanmala_1', src: 'https://togetherwecan21.org/img/vyakhan 13.jpg', alt: 'Lecture Series Event 1' }, { id: 'vyakhyanmala_2', src: 'https://togetherwecan21.org/img/vyakhan 13.2.jpg', alt: 'Lecture Series Event 2' }, { id: 'vyakhyanmala_3', src: 'https://togetherwecan21.org/img/vyakhan 13.3.jpg', alt: 'Lecture Series Event 3' }, { id: 'vyakhyanmala_4', src: 'https://togetherwecan21.org/img/vyakhan 13.4.jpg', alt: 'Lecture Series Event 4' }, ] },
            { title: "Roti Initiative: One Bite", description: "Our team prepares and distributes packets of roti (flatbread) and vegetables to needy children, women, and elderly on the streets.", images: [ { id: 'poli_1', src: 'https://togetherwecan21.org/img/poli 14.jpg', alt: 'Roti Initiative 1' }, { id: 'poli_2', src: 'https://togetherwecan21.org/img/poli 14.2.jpg', alt: 'Roti Initiative 2' }, { id: 'poli_3', src: 'https://togetherwecan21.org/img/poli 14.3.jpg', alt: 'Roti Initiative 3' }, { id: 'poli_4', src: 'https://togetherwecan21.org/img/poli 14.4.jpg', alt: 'Roti Initiative 4' }, ] },
            { title: "Drawing Competition", description: "A drawing competition was held for children from the hamlets of Yeoor and Gokulnagar. The children created beautiful drawings.", images: [ { id: 'chitra_1', src: 'https://togetherwecan21.org/img/chitra 15.jpg', alt: 'Drawing Competition 1' }, { id: 'chitra_2', src: 'https://togetherwecan21.org/img/chitra 15.2.jpg', alt: 'Drawing Competition 2' }, ] },
            { title: "Mental Health", description: "We have arranged stress relief lectures for school students and police personnel, and we will continue to do so in the future.", images: [ { id: 'manasik_1', src: 'https://togetherwecan21.org/img/12.jpg', alt: 'Mental Health Session 1' }, { id: 'manasik_2', src: 'https://togetherwecan21.org/img/11.jpg', alt: 'Mental Health Session 2' }, ] },
            { title: "Grain Distribution", description: "Grains are distributed to the needy from time to time.", images: [ { id: 'dhanya_1', src: 'https://togetherwecan21.org/img/dhanya 16.1.jpg', alt: 'Grain Distribution 1' }, { id: 'dhanya_2', src: 'https://togetherwecan21.org/img/dhanya 16.2.jpg', alt: 'Grain Distribution 2' }, ] },
            { title: "Health Check-up", description: "Ayurvedic doctor Kirti conducted check-ups for the children from the hamlet.", images: [ { id: 'arogya_1', src: 'https://togetherwecan21.org/img/ayurveda 17.jpg', alt: 'Health Check-up' }, ] },
            { title: "Fancy Dress Competition", description: "A fancy dress competition for the children of the hamlet.", images: [ { id: 'fancy_1', src: 'https://togetherwecan21.org/img/fancy 18.jpg', alt: 'Fancy Dress Competition' }, ] },
            { title: "Late Sushma Swaraj Award", description: "We were honored with the Late Sushma Swaraj Award for our work.", images: [ { id: 'award_1', src: 'https://togetherwecan21.org/img/sushma.jpg', alt: 'Late Sushma Swaraj Award' }, ] },
            { title: "Sweater Distribution", description: "Sweaters were knitted and distributed to young children in the hamlet during winter.", images: [ { id: 'sweater_1', src: 'https://togetherwecan21.org/img/sweater 19.jpg', alt: 'Sweater Distribution' }, ] },
            { title: "Diwali Sweets Distribution", description: "Every year, Diwali sweets are distributed to the women of the hamlet.", images: [ { id: 'diwali_1', src: 'https://togetherwecan21.org/img/diwali 20.jpg', alt: 'Diwali Sweets Distribution' }, ] },
            { title: "School Supplies Distribution", description: "School supplies were provided to the children.", images: [ { id: 'school_1', src: 'https://togetherwecan21.org/img/books 21.jpg', alt: 'School Supplies Distribution 1' }, { id: 'school_2', src: 'https://togetherwecan21.org/img/books 21.3.jpg', alt: 'School Supplies Distribution 2' }, ] },
        ];

        const ImageCard = ({ src, alt }) => {
            return (
                <div className="gallery-image-container aspect-[4/3]">
                    <img 
                        src={src} 
                        alt={alt} 
                        className="gallery-image" 
                        loading="lazy" 
                        onError={(e) => {
                          e.target.onerror = null;
                          e.target.src = `https://placehold.co/800x600/E5E7EB/1F2937?text=Image+Unavailable`;
                        }}
                    />
                    <div className="image-overlay">
                        <p className="image-description">{alt}</p>
                    </div>
                </div>
            );
        };

        const GallerySection = ({ title, description, images }) => {
            const gridClasses = () => {
                const count = images.length;
                if (count === 1) return 'grid-cols-1 max-w-2xl mx-auto';
                if (count === 2) return 'grid-cols-1 sm:grid-cols-2';
                if (count === 3) return 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3';
                return 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-4';
            };
            return (
                <section className="py-12 md:py-20">
                    <div className="container mx-auto px-4 md:px-8">
                        <div className="text-center mb-10 md:mb-14">
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-900 tracking-tight mb-4 relative inline-block">
                                {title}
                                <span className="absolute -bottom-2 left-0 w-full h-1 bg-gradient-to-r from-pink-400 to-rose-500 rounded-full opacity-60"></span>
                            </h2>
                            <p className="max-w-3xl mx-auto text-lg text-gray-600 leading-relaxed">{description}</p>
                        </div>
                        <div className={`grid ${gridClasses()} gap-6 md:gap-8`}>
                            {images.map(image => (
                                <ImageCard key={image.id} src={image.src} alt={image.alt} />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const toggleMenu = () => { setIsMenuOpen(!isMenuOpen); };
            const closeMenu = () => { setIsMenuOpen(false); };

            const content = {
                nav: { brand: 'Together We Can', home: 'Home', contribute : 'Contribute', about: 'About', abhyasika: 'Abhyasika', mentalHealth: 'Mental Health', projects: 'Projects', gallery: 'Gallery', contact: 'Contact', }
            };

            return (
                <div className="flex flex-col min-h-screen">
                     {/* --- NAVBAR --- */}
                     <nav className="fixed w-full top-0 z-50 bg-white/80 backdrop-blur-md border-b border-white/20 shadow-sm transition-all duration-300">
                        <div className="container mx-auto flex items-center justify-between p-4 lg:px-8">
                            <a href="index.html" className="flex items-center space-x-3 group">
                                <img src="https://togetherwecan21.org/img/logo.jpg" alt="TWC Foundation Logo" className="w-17 h-12 md:w-17 md:h-14 rounded-full shadow-md group-hover:scale-105 transition-transform duration-300 border-2 border-pink-50" />
                                <span className="font-bold text-lg md:text-xl lg:text-2xl text-gray-800 tracking-tight group-hover:text-pink-600 transition-colors">{content.nav.brand}</span>
                            </a>
                            
                            <div className="hidden xl:flex items-center space-x-1">
                                <a href="index.html#about" className="px-3 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-1"><Icons.Info size={16} /><span>{content.nav.about}</span></a>
                                <a href="index.html#abhyasika" className="px-3 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-1"><Icons.BookOpen size={16} /><span>{content.nav.abhyasika}</span></a>
                                <a href="index.html#mental-health" className="px-3 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-1"><Icons.Brain size={16} /><span>{content.nav.mentalHealth}</span></a>
                                <a href="index.html#projects" className="px-3 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-1"><Icons.HandHelping size={16} /><span>{content.nav.projects}</span></a>
                                <span className="px-3 py-2 rounded-full text-sm font-medium text-pink-700 bg-pink-50 border border-pink-100 flex items-center space-x-1 cursor-default"><Icons.ImageIcon size={16} /><span>{content.nav.gallery}</span></span>
                                <a href="index.html#contact" className="px-3 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-1"><Icons.Phone size={16} /><span>{content.nav.contact}</span></a>
                                <a href="upi.html" className="ml-2 px-5 py-2.5 rounded-full text-sm font-semibold bg-pink-600 text-white hover:bg-pink-700 shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 flex items-center space-x-2">
                                    <Icons.HandHelping size={16} /><span>{content.nav.contribute}</span>
                                </a>
                                <a href="gallery.html" className="ml-2 p-2.5 rounded-full bg-rose-50 text-pink-600 hover:bg-rose-100 transition-colors duration-200 text-xs font-bold border border-rose-100"><span>मराठी</span></a>
                            </div>

                            <button onClick={toggleMenu} className="xl:hidden p-2 rounded-full text-gray-600 hover:bg-pink-50 hover:text-pink-600 transition-colors focus:outline-none">
                                <Icons.Menu size={28} />
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] flex flex-col bg-white/95 backdrop-blur-xl animate-fade-in-down">
                            <div className="flex justify-end p-6">
                                <button onClick={toggleMenu} className="p-2 rounded-full text-gray-500 hover:text-pink-600 hover:bg-pink-50 transition-colors"><Icons.X size={32} /></button>
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-center space-y-6 overflow-y-auto pb-10">
                                <a onClick={closeMenu} href="index.html#about" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.about}</a>
                                <a onClick={closeMenu} href="index.html#abhyasika" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.abhyasika}</a>
                                <a onClick={closeMenu} href="index.html#mental-health" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.mentalHealth}</a>
                                <a onClick={closeMenu} href="index.html#projects" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.projects}</a>
                                <span className="text-2xl font-semibold text-pink-600 cursor-default">{content.nav.gallery}</span>
                                <a onClick={closeMenu} href="index.html#contact" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.contact}</a>
                                <div className="pt-6 w-full max-w-xs flex flex-col gap-4 px-6">
                                    <a href="upi.html" className="w-full py-4 rounded-xl text-lg font-bold bg-pink-600 text-white text-center shadow-lg active:scale-95 transition-transform">{content.nav.contribute}</a>
                                    <a href="gallery.html" className="w-full py-3 rounded-xl text-lg font-medium bg-rose-50 text-pink-700 text-center border border-rose-100 active:scale-95 transition-transform">मराठी</a>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <main className="flex-grow pt-24">
                        <header className="py-16 md:py-24 text-center bg-white relative overflow-hidden">
                             {/* Decorative background elements */}
                             <div className="absolute top-10 left-10 w-32 h-32 bg-pink-100 rounded-full blur-3xl opacity-50"></div>
                             <div className="absolute bottom-10 right-10 w-40 h-40 bg-rose-100 rounded-full blur-3xl opacity-50"></div>
                             
                            <div className="container mx-auto px-4 relative z-10 animate-fade-in-down">
                                <h1 className="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tighter mb-6">Our Gallery</h1>
                                <p className="text-lg md:text-xl text-gray-600 max-w-3xl mx-auto leading-relaxed">A glimpse into our work and the communities we serve through various initiatives.</p>
                            </div>
                        </header>
                        
                        {galleryData.map((section, index) => (
                            <div key={index} className={index % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                <GallerySection title={section.title} description={section.description} images={section.images} />
                            </div>
                        ))}
                    </main>

                    <footer className="bg-gray-900 text-white py-12 border-t border-gray-800">
                        <div className="container mx-auto px-4 text-center">
                            <div className="flex items-center justify-center gap-3 mb-8 opacity-80">
                                <img src="https://togetherwecan21.org/img/logo.jpg" alt="Logo" className="w-10 h-10 rounded-full grayscale hover:grayscale-0 transition-all duration-500" />
                                <span className="font-bold text-xl tracking-tight">Together We Can</span>
                            </div>
                            <p className="text-sm text-gray-500">© {new Date().getFullYear()} Together We Can Foundation. All rights reserved.|Website design created by Rrucha Wamanse and Gautam Papat</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) { createRoot(rootElement).render(<App />); }
    </script>
</body>
</html>
