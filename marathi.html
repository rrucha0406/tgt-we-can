        // --- Circular Gallery Component (Optimized) ---
        function CircularGallery({ items }) {
          const [rotation, setRotation] = useState(0);
          const galleryRef = useRef(null);
          const [isDragging, setIsDragging] = useState(false);
          const [startX, setStartX] = useState(0);
          const [lastX, setLastX] = useState(0);
          const [isHovering, setIsHovering] = useState(false);
          const animationFrameRef = useRef();
          
          const [dimensions, setDimensions] = useState({
            itemWidth: 300,
            itemHeight: 200,
            radius: 500,
          });

          const updateDimensions = useCallback(() => {
            const screenWidth = window.innerWidth;
            let newItemWidth = 300;
            let newItemHeight = 200;
            let newRadius = 500;
            
            if (screenWidth < 768) {
              newItemWidth = 200;
              newItemHeight = 150;
              newRadius = 250;
            } else if (screenWidth < 1024) {
              newItemWidth = 250;
              newItemHeight = 175;
              newRadius = 400;
            }
            
            setDimensions({
              itemWidth: newItemWidth,
              itemHeight: newItemHeight,
              radius: newRadius
            });
          }, []);

          useEffect(() => {
            updateDimensions();
            window.addEventListener('resize', updateDimensions);
            return () => window.removeEventListener('resize', updateDimensions);
          }, [updateDimensions]);

          const totalItems = items.length;
          const angleStep = 360 / totalItems;

          const handleMouseDown = useCallback((e) => {
            e.preventDefault();
            setIsDragging(true);
            setStartX(e.clientX);
            setLastX(e.clientX);
          }, []);

          const handleTouchStart = useCallback((e) => {
            if (e.touches.length === 1) {
              setIsDragging(true);
              setStartX(e.touches[0].clientX);
              setLastX(e.touches[0].clientX);
            }
          }, []);

          const handleMouseMove = useCallback((e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            setRotation(prevRotation => prevRotation + deltaX * 0.5);
            setLastX(e.clientX);
          }, [isDragging, lastX]);

          const handleTouchMove = useCallback((e) => {
            if (!isDragging || e.touches.length !== 1) return;
            const deltaX = e.touches[0].clientX - lastX;
            setRotation(prevRotation => prevRotation + deltaX * 0.5);
            setLastX(e.touches[0].clientX);
          }, [isDragging, lastX]);

          const handleMouseUp = useCallback(() => { setIsDragging(false); }, []);
          const handleTouchEnd = useCallback(() => { setIsDragging(false); }, []);

          useEffect(() => {
            const galleryElement = galleryRef.current;
            if (!galleryElement) return;

            galleryElement.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            galleryElement.addEventListener('touchstart', handleTouchStart, { passive: false });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd);

            return () => {
              galleryElement.removeEventListener('mousedown', handleMouseDown);
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mouseup', handleMouseUp);
              galleryElement.removeEventListener('touchstart', handleTouchStart);
              window.removeEventListener('touchmove', handleTouchMove);
              window.removeEventListener('touchend', handleTouchEnd);
            };
          }, [handleMouseDown, handleMouseMove, handleMouseUp, handleTouchStart, handleTouchMove, handleTouchEnd]);
          
          useEffect(() => {
            const autoRotate = () => {
              if (!isDragging && !isHovering) {
                setRotation(prev => prev + 0.03); 
              }
              animationFrameRef.current = requestAnimationFrame(autoRotate);
            };
            animationFrameRef.current = requestAnimationFrame(autoRotate);
            return () => {
              if (animationFrameRef.current) {
                cancelAnimationFrame(animationFrameRef.current);
              }
            };
          }, [isDragging, isHovering]);

          return (
            <div 
              className="circular-gallery-container flex items-center justify-center min-h-[500px]"
              onMouseEnter={() => setIsHovering(true)}
              onMouseLeave={() => setIsHovering(false)}
            >
              <div
                ref={galleryRef}
                className="circular-gallery-items"
                style={{ transform: `rotateY(${rotation}deg)` }}
              >
                {items.map((item, index) => {
                  const angle = index * angleStep;
                  return (
                    <div
                      key={index}
                      className="circular-gallery-item flex flex-col items-center justify-center bg-white transform"
                      style={{
                        transform: `rotateY(${angle}deg) translateZ(${dimensions.radius}px)`,
                        width: `${dimensions.itemWidth}px`,
                        height: `${dimensions.itemHeight}px`,
                        marginLeft: `-${dimensions.itemWidth / 2}px`,
                        marginTop: `-${dimensions.itemHeight / 2}px`,
                        zIndex: Math.floor(Math.cos((angle - rotation) * Math.PI / 180) * 100)
                      }}
                    >
                      <img
                        src={item.image}
                        alt="आमच्या उपक्रमातील एक क्षणचित्र"
                        className="w-full h-full object-cover rounded-md pointer-events-none"
                        onError={(e) => {
                          e.target.onerror = null;
                          e.target.src = `https://placehold.co/800x600/E5E7EB/1F2937?text=Image+Unavailable`;
                        }}
                      />
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }
