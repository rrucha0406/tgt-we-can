<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Our Cause - Together We Can Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      body { font-family: 'Montserrat', sans-serif; }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-down { animation: fadeInDown 0.8s ease-out forwards; }
      
      /* Mobile Menu Animation */
      .mobile-menu-enter { opacity: 0; transform: translateY(-10px); }
      .mobile-menu-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased selection:bg-pink-100 selection:text-pink-700">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- ICONS ---
        const Icons = {
            HandHelping: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 1.9c.7 0 1.4.3 1.8.8l4 5.2c.5.5.8 1.2.8 1.9V10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V8.8c0-.7.3-1.4.8-1.9L11 1.9z" /><path d="M12 11v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg> ),
            Info: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg> ),
            Phone: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></svg> ),
            BookOpen: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg> ),
            Brain: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5c-3.18 0-6 2.82-6 6a6 6 0 0 0 12 0c0-3.18-2.82-6-6-6z" /><path d="M12 18c-3.18 0-6-2.82-6-6" /><path d="M12 18c3.18 0 6-2.82 6-6" /><path d="M12 11a6 6 0 0 1-6 6" /><path d="M12 11a6 6 0 0 0 6 6" /></svg> ),
            Menu: ({ size = 24, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="18" x2="20" y2="18" /></svg> ),
            X: ({ size = 24, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg> ),
            ImageIcon: ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> ),
            Copy: ({ size = 16, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> ),
            Check: ({ size = 16, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg> )
        };

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [copiedField, setCopiedField] = useState(null);

            const toggleMenu = () => setIsMenuOpen(!isMenuOpen);
            const closeMenu = () => setIsMenuOpen(false);

            const copyToClipboard = (text, fieldId) => {
                // Fallback for clipboard API
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedField(fieldId);
                    setTimeout(() => setCopiedField(null), 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textArea);
            };

            const content = {
                nav: { brand: 'Together We Can', home: 'Home', contribute : 'Contribute', about: 'About', abhyasika: 'Abhyasika', mentalHealth: 'Mental Health', projects: 'Projects', gallery: 'Gallery', contact: 'Contact' }
            };

            const bankDetails = [
                { id: 'accName', label: 'Account Name', value: 'Together We Can Foundation' },
                { id: 'accNum', label: 'Account Number', value: '0495102000023649' },
                { id: 'bankName', label: 'Bank Name', value: 'IDBI Bank' },
                { id: 'ifscCode', label: 'IFSC Code', value: 'IBKL 0000495' },
            ];

            return (
                <div className="flex flex-col min-h-screen">
                     {/* --- NAVBAR (Consistent with Index) --- */}
                    <nav className="fixed w-full top-0 z-50 bg-white/80 backdrop-blur-md border-b border-white/20 shadow-sm transition-all duration-300">
                        <div className="container mx-auto flex items-center justify-between p-4 lg:px-8">
                            <a href="index.html" className="flex items-center space-x-3 group">
                                <img src="img/logo.jpg" alt="TWC Foundation Logo" className="w-17 h-12 md:w-17 md:h-14 rounded-full shadow-md group-hover:scale-105 transition-transform duration-300 border-2 border-pink-50" />
                                <span className="font-bold text-lg md:text-xl lg:text-2xl text-gray-800 tracking-tight group-hover:text-pink-600 transition-colors">{content.nav.brand}</span>
                            </a>
                            
                            <div className="hidden xl:flex items-center space-x-1">
                                <a href="index.html#about" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.Info size={16} /><span>{content.nav.about}</span></a>
                                <a href="index.html#abhyasika" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.BookOpen size={16} /><span>{content.nav.abhyasika}</span></a>
                                <a href="index.html#mental-health" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.Brain size={16} /><span>{content.nav.mentalHealth}</span></a>
                                <a href="index.html#projects" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.HandHelping size={16} /><span>{content.nav.projects}</span></a>
                                <a href="gallery_en.html" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.ImageIcon size={16} /><span>{content.nav.gallery}</span></a>
                                <a href="index.html#contact" className="px-4 py-2 rounded-full text-sm font-medium text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200 flex items-center space-x-2"><Icons.Phone size={16} /><span>{content.nav.contact}</span></a>
                                <span className="ml-2 px-5 py-2.5 rounded-full text-sm font-semibold bg-pink-600 text-white shadow-md cursor-default flex items-center space-x-2"><Icons.HandHelping size={16} /><span>{content.nav.contribute}</span></span>
                                <a href="marathi.html" className="ml-2 p-2.5 rounded-full bg-rose-50 text-pink-600 hover:bg-rose-100 transition-colors duration-200 text-xs font-bold border border-rose-100"><span>मराठी</span></a>
                            </div>

                            <button onClick={toggleMenu} className="xl:hidden p-2 rounded-full text-gray-600 hover:bg-pink-50 hover:text-pink-600 transition-colors focus:outline-none">
                                <Icons.Menu size={28} />
                            </button>
                        </div>
                    </nav>

                     {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] flex flex-col bg-white/95 backdrop-blur-xl animate-fade-in-down">
                            <div className="flex justify-end p-6">
                                <button onClick={toggleMenu} className="p-2 rounded-full text-gray-500 hover:text-pink-600 hover:bg-pink-50 transition-colors"><Icons.X size={32} /></button>
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-center space-y-6 overflow-y-auto pb-10">
                                <a href="index.html#about" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.about}</a>
                                <a href="index.html#abhyasika" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.abhyasika}</a>
                                <a href="index.html#mental-health" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.mentalHealth}</a>
                                <a href="index.html#projects" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.projects}</a>
                                <a href="gallery_en.html" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.gallery}</a>
                                <a href="index.html#contact" className="text-2xl font-semibold text-gray-800 hover:text-pink-600 transition-colors">{content.nav.contact}</a>
                                <div className="pt-6 w-full max-w-xs flex flex-col gap-4 px-6">
                                    <span className="w-full py-4 rounded-xl text-lg font-bold bg-pink-600 text-white text-center shadow-lg opacity-90 cursor-default">{content.nav.contribute}</span>
                                    <a href="marathi.html" className="w-full py-3 rounded-xl text-lg font-medium bg-rose-50 text-pink-700 text-center border border-rose-100 active:scale-95 transition-transform">मराठी</a>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow flex items-center justify-center pt-32 pb-16 px-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 md:p-12 max-w-lg w-full mx-auto border border-gray-100 animate-fade-in-down">
                            
                            {/* Header */}
                            <div className="text-center mb-8">
                                <div className="relative inline-block">
                                    <div className="absolute inset-0 bg-pink-100 rounded-full blur-xl opacity-50"></div>
                                    <img src="https://togetherwecan21.org/img/logo.jpg" alt="TWC Foundation Logo" className="relative w-32 h-32 rounded-full mx-auto border-4 border-white shadow-lg" />
                                </div>
                                <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 mt-6 mb-3">Support Our Cause</h1>
                                <p className="text-gray-600">Your contribution helps us build a brighter future for our communities.</p>
                            </div>

                            {/* UPI Section */}
                            <div className="bg-gradient-to-br from-gray-50 to-pink-50 p-6 rounded-2xl border border-pink-100 mb-8">
                                <h2 className="font-bold text-lg mb-4 text-gray-800 flex items-center justify-center gap-2">
                                    Donate via UPI
                                </h2>
                                <div className="flex flex-col items-center">
                                    <div className="p-3 bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
                                
                                        <img src="img/scanner.jpg" alt="UPI QR Code" className="w-58 h-58 rounded-lg" />
                                    </div>
                                    <ol className="list-decimal list-inside text-sm text-gray-600 space-y-2 text-left w-full max-w-xs bg-white/50 p-4 rounded-xl">
                                        <li>Open your UPI app (GPay, PhonePe).</li>
                                        <li>Scan the QR code shown above.</li>
                                        <li>Enter amount and confirm payment.</li>
                                    </ol>
                                </div>
                            </div>

                            {/* Bank Details Section */}
                            <div className="pt-8 border-t border-gray-100">
                                <h2 className="font-bold text-lg mb-4 text-gray-800">Or Donate via Bank Transfer:</h2>
                                <div className="space-y-4">
                                    {bankDetails.map((detail) => (
                                        <div key={detail.id} className="flex items-center justify-between p-3 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors border border-gray-100 group">
                                            <div className="overflow-hidden">
                                                <p className="text-xs text-gray-500 uppercase tracking-wider font-semibold">{detail.label}</p>
                                                <p className="font-semibold text-gray-800 truncate pr-2">{detail.value}</p>
                                            </div>
                                            <button 
                                                onClick={() => copyToClipboard(detail.value, detail.id)}
                                                className={`flex-shrink-0 p-2 rounded-full transition-all duration-200 ${copiedField === detail.id ? 'bg-green-100 text-green-600' : 'bg-white text-pink-500 hover:bg-pink-100 shadow-sm'}`}
                                                aria-label="Copy"
                                            >
                                                {copiedField === detail.id ? <Icons.Check /> : <Icons.Copy />}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="text-center mt-8 space-y-6">
                                <p className="text-pink-600 font-semibold bg-pink-50 inline-block px-4 py-2 rounded-full text-sm">Thank you for your generosity! ❤️</p>
                                <a href="index.html" className="block w-full bg-gray-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-800 transition-all duration-300 transform hover:-translate-y-1">
                                    Back to Home
                                </a>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-gray-900 text-white py-8 border-t border-gray-800">
                        <div className="container mx-auto px-4 text-center">
                            <p className="text-sm text-gray-500">© {new Date().getFullYear()} Together We Can Foundation. All rights reserved.| Website design created by Rrucha Wamanse and Gautam Papat</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            createRoot(rootElement).render(<App />);
        }
    </script>
</body>
</html>
